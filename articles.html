<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מרכז הידע — TIME.ME | מאמרים על ניהול נכסים</title>
<meta name="description" content="מאמרים מקצועיים על ניהול נכסים — לשוכרים, בעלי נכסים וארגונים. ביטוחים, הוצאות, ערבויות ועוד." />
<link rel="canonical" href="https://www.timeme.co.il/articles.html" />
<meta property="og:title" content="מרכז הידע — TIME.ME" />
<meta property="og:description" content="מאמרים מקצועיים על ניהול נכסים בישראל" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;700;900&family=Heebo:wght@300;400;500;700&display=swap');
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --navy: #042C53;
    --blue: #185FA5;
    --light-blue: #378ADD;
    --green: #1D9E75;
    --orange: #FF8F00;
    --purple: #534AB7;
    --red: #E24B4A;
    --bg: #F5F8FF;
    --white: #FFFFFF;
    --text: #1A1A2E;
    --text-light: #555;
  }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    direction: rtl;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, var(--navy) 0%, #0F3D6E 100%);
    padding: 16px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(4,44,83,0.3);
  }

  .logo {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 28px;
    font-weight: 900;
    color: white;
    text-decoration: none;
    letter-spacing: 2px;
  }

  .logo em { color: #85B7EB; font-style: normal; }

  .header-nav { display: flex; gap: 12px; }
  .btn-nav {
    padding: 8px 18px;
    border-radius: 8px;
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    border: none;
  }
  .btn-home { background: rgba(255,255,255,0.1); color: #85B7EB; border: 1.5px solid rgba(255,255,255,0.2); }
  .btn-login { background: var(--light-blue); color: white; }

  /* HERO */
  .hero {
    background: linear-gradient(135deg, var(--navy) 0%, #185FA5 100%);
    padding: 60px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -20%;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: rgba(55,138,221,0.1);
  }

  .hero-tag {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    color: #85B7EB;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 16px;
    border: 1px solid rgba(255,255,255,0.2);
  }

  .hero h1 {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 42px;
    font-weight: 900;
    color: white;
    margin-bottom: 12px;
    line-height: 1.2;
  }

  .hero p { color: #B5D4F4; font-size: 16px; max-width: 600px; margin: 0 auto; }

  /* SEARCH */
  .search-bar {
    max-width: 500px;
    margin: 30px auto 0;
    position: relative;
  }

  .search-bar input {
    width: 100%;
    padding: 14px 50px 14px 20px;
    border-radius: 50px;
    border: none;
    font-size: 15px;
    font-family: 'Heebo', sans-serif;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }

  .search-bar span {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 20px;
  }

  /* MAIN */
  .main { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

  /* CATEGORIES */
  .categories {
    display: flex;
    gap: 10px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .cat-btn {
    padding: 8px 20px;
    border-radius: 50px;
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s;
  }

  .cat-btn.active, .cat-btn:hover { transform: translateY(-1px); }
  .cat-all { background: var(--navy); color: white; }
  .cat-tenant { background: #E1F5EE; color: #0F6E56; border-color: #5DCAA5; }
  .cat-tenant.active { background: #1D9E75; color: white; }
  .cat-owner { background: #E6F1FB; color: #185FA5; border-color: #B5D4F4; }
  .cat-owner.active { background: #185FA5; color: white; }
  .cat-personal { background: #EDE7F6; color: #4527A0; border-color: #B39DDB; }
  .cat-personal.active { background: #534AB7; color: white; }
  .cat-org { background: #FFF3E0; color: #8A6000; border-color: #FFB74D; }
  .cat-org.active { background: #FF8F00; color: white; }
  .cat-solar { background: #FFFDE7; color: #F57F17; border-color: #FFD600; }
  .cat-solar.active { background: #F57F17; color: white; }

  /* ARTICLES GRID */
  .articles-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 24px;
  }

  .article-card {
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(4,44,83,0.08);
    border: 1.5px solid #E6F1FB;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    flex-direction: column;
  }

  .article-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 32px rgba(4,44,83,0.15);
    border-color: var(--light-blue);
  }

  .card-stripe {
    height: 6px;
    width: 100%;
  }

  .card-body { padding: 22px; flex: 1; }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }

  .card-category {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
  }

  .card-read-time { font-size: 11px; color: #888; }

  .card-title {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 10px;
    line-height: 1.4;
  }

  .card-excerpt { font-size: 13px; color: var(--text-light); line-height: 1.7; }

  .card-footer {
    padding: 14px 22px;
    border-top: 1px solid #F0F6FF;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-icon { font-size: 24px; }
  .card-arrow { color: var(--blue); font-size: 18px; font-weight: 700; }

  /* ARTICLE MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(4,44,83,0.6);
    z-index: 1000;
    overflow-y: auto;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }

  .modal {
    background: white;
    border-radius: 20px;
    max-width: 720px;
    width: 100%;
    margin: 20px auto;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(4,44,83,0.3);
  }

  .modal-header {
    padding: 30px 36px 24px;
    border-bottom: 1px solid #F0F6FF;
    position: relative;
  }

  .modal-close {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #F0F6FF;
    border: none;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal-category { font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 20px; display: inline-block; margin-bottom: 12px; }
  .modal-title { font-family: 'Frank Ruhl Libre', serif; font-size: 28px; font-weight: 900; color: var(--navy); line-height: 1.3; margin-bottom: 8px; }
  .modal-meta { font-size: 12px; color: #888; }

  .modal-body { padding: 30px 36px; }

  .modal-body h3 { font-family: 'Frank Ruhl Libre', serif; font-size: 20px; color: var(--navy); margin: 24px 0 10px; }
  .modal-body p { font-size: 14px; color: var(--text-light); line-height: 1.8; margin-bottom: 12px; }
  .modal-body ul { padding-right: 20px; margin-bottom: 12px; }
  .modal-body li { font-size: 14px; color: var(--text-light); line-height: 1.8; margin-bottom: 6px; }

  .modal-tip {
    background: #E1F5EE;
    border-right: 4px solid #1D9E75;
    border-radius: 8px;
    padding: 14px 16px;
    margin: 16px 0;
    font-size: 13px;
    color: #0F6E56;
    font-weight: 500;
  }

  .modal-warning {
    background: #FFF3E0;
    border-right: 4px solid #FF8F00;
    border-radius: 8px;
    padding: 14px 16px;
    margin: 16px 0;
    font-size: 13px;
    color: #8A6000;
    font-weight: 500;
  }

  .modal-cta {
    background: linear-gradient(135deg, var(--navy), var(--blue));
    padding: 24px 36px;
    text-align: center;
    color: white;
  }

  .modal-cta p { color: #B5D4F4; font-size: 14px; margin-bottom: 14px; }
  .modal-cta button {
    background: white;
    color: var(--navy);
    border: none;
    padding: 12px 32px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Heebo', sans-serif;
  }

  /* SOLAR CTA */
  .solar-section {
    background: linear-gradient(135deg, #1A237E 0%, #283593 100%);
    border-radius: 20px;
    padding: 40px;
    margin-top: 40px;
    text-align: center;
    color: white;
    position: relative;
    overflow: hidden;
  }

  .solar-section::before {
    content: '☀️';
    position: absolute;
    font-size: 120px;
    opacity: 0.1;
    top: -10px;
    right: -20px;
  }

  .solar-section h2 { font-family: 'Frank Ruhl Libre', serif; font-size: 28px; margin-bottom: 12px; }
  .solar-section p { color: #B3C2F0; margin-bottom: 24px; font-size: 15px; }
  .solar-section input {
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    font-family: 'Heebo', sans-serif;
    width: 300px;
    max-width: 100%;
    margin-left: 10px;
  }
  .solar-section button {
    background: #FFD600;
    color: #1A237E;
    border: none;
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Heebo', sans-serif;
  }

  @media (max-width: 600px) {
    .header { padding: 12px 16px; }
    .hero { padding: 40px 16px; }
    .hero h1 { font-size: 28px; }
    .main { padding: 20px 14px; }
    .articles-grid { grid-template-columns: 1fr; gap: 14px; }
    .modal-header, .modal-body { padding: 20px; }
    .modal-title { font-size: 22px; }
    .modal-cta { padding: 20px; }
    .solar-section { padding: 24px 16px; }
    .solar-section input { width: 100%; margin: 0 0 10px; }
    .solar-section button { width: 100%; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <a href="index.html" class="logo">TIME<em>.</em>ME</a>
  <div class="header-nav">
    <a href="index.html" class="btn-nav btn-home">🏠 לוח נכסים</a>
    <a href="app.html" class="btn-nav btn-login">כניסה 🔑</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-tag">📚 מרכז הידע</div>
  <h1>כל מה שצריך לדעת<br>על ניהול נכסים</h1>
  <p>מאמרים מקצועיים לשוכרים, בעלי נכסים וארגונים — מהניסיון היומיומי בשטח</p>
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="חפש מאמר..." oninput="filterArticles()" />
    <span>🔍</span>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- CATEGORIES -->
  <div class="categories">
    <button class="cat-btn cat-all active" onclick="filterCategory('all',this)">📋 הכל</button>
    <button class="cat-btn cat-tenant" onclick="filterCategory('tenant',this)">🔑 שוכר</button>
    <button class="cat-btn cat-owner" onclick="filterCategory('owner',this)">🏠 בעל נכס</button>
    <button class="cat-btn cat-personal" onclick="filterCategory('personal',this)">🏡 שימוש אישי</button>
    <button class="cat-btn cat-org" onclick="filterCategory('org',this)">🏢 ארגון</button>
    <button class="cat-btn cat-solar" onclick="filterCategory('solar',this)">☀️ סולארי</button>
  </div>

  <!-- ARTICLES GRID -->
  <div class="articles-grid" id="articles-grid"></div>

  <!-- SOLAR CTA -->
  <div class="solar-section" id="solar-section">
    <h2>☀️ מערכת סולארית לנכס שלך</h2>
    <p>בדוק אם הנכס שלך מתאים למערכת סולארית — חסוך בחשמל ויצר הכנסה נוספת</p>
    <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:10px;">
      <input type="text" id="solar-address" placeholder="הכנס כתובת מדויקת..." />
      <button onclick="checkSolar()">בדוק עכשיו ☀️</button>
    </div>
    <div id="solar-result" style="margin-top:16px;font-size:14px;"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">✕</button>
      <div class="modal-category" id="modal-cat"></div>
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-meta" id="modal-meta"></div>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-cta">
      <p>נהל את הנכסים שלך בצורה חכמה עם TIME.ME</p>
      <button onclick="window.location.href='app.html'">התחל עכשיו — חינם 🚀</button>
    </div>
  </div>
</div>

<script>
const ARTICLES = [
  // ===== שוכר =====
  {
    id: 1,
    category: 'tenant',
    catLabel: '🔑 שוכר',
    catColor: '#E1F5EE',
    catText: '#0F6E56',
    stripe: '#1D9E75',
    icon: '📊',
    title: 'הכנסת נתוני הוצאות — למה זה חשוב?',
    excerpt: 'מעקב אחר הוצאות הדירה שלך יכול לחסוך כסף ולמנוע ויכוחים מיותרים עם בעל הנכס.',
    readTime: '3 דקות קריאה',
    content: `
      <h3>מדוע לתעד הוצאות?</h3>
      <p>כשוכר, אתה עלול להוציא כסף על תיקונים, ארנונה, ועד בית ועוד — ולעיתים קשה לדעת מי אחראי על מה. תיעוד מסודר יכול להציל אותך במחלוקות.</p>
      
      <div class="modal-tip">💡 טיפ: צלם כל קבלה מיד לאחר התשלום ושמור בתיקייה ייעודית</div>

        <li>🔧 <strong>תיקונים</strong> — שרברב, חשמלאי, מנעולן</li>
        <li>🏛️ <strong>ארנונה</strong> — חשוב לוודא שמוגדרת על שמך</li>
        <li>🏢 <strong>ועד בית</strong> — לפי החוזה</li>
        <li>⚡ <strong>חשמל, מים, גז</strong> — מדי חודש</li>
        <li>🌐 <strong>אינטרנט</strong> — לעיתים משולם דרך בעל הנכס</li>
      </ul>
      
      <h3>מה שייך לבעל הנכס?</h3>
      <p>בדרך כלל, בעל הנכס אחראי על: תיקוני מבנה (גג, צנרת ראשית), ביטוח מבנה, ועד בית (אם לא סוכם אחרת בחוזה).</p>
      
      <div class="modal-warning">⚠️ שים לב: לפני כל תיקון גדול — קבל אישור בכתב מבעל הנכס</div>
      
      <h3>איך TIME.ME עוזר?</h3>
      <p>במערכת TIME.ME תוכל להזין כל הוצאה בקלות, לראות סיכום חודשי ושנתי, ולשתף עם בעל הנכס בלחיצה.</p>
    `
  },
  {

    catLabel: '🔑 שוכר',
    catColor: '#E1F5EE',
    catText: '#0F6E56',
    stripe: '#1D9E75',
    icon: '🛡️',
    title: 'קיום ביטוחים לפי החוזה',
    excerpt: 'החוזה מחייב אותך לבטח את הנכס? הנה מה שצריך לדעת על ביטוח שוכר.',

    content: `
      <h3>איזה ביטוח מחויב מהשוכר?</h3>

      <h3>סוגי ביטוח לשוכר</h3>

        <li>🏠 <strong>ביטוח תכולה</strong> — מגן על הרהיטים והחפצים שלך</li>

  {
    id: 3,

    catColor: '#E1F5EE',

    content: `
      <h3>מה אתה חייב לשמור?</h3>

      <h3>בלאי סביר vs. נזק</h3>

        <li>✅ <strong>בלאי סביר</strong> — שריטות קטנות בריצפה, דהיית צבע, בלאי בציוד ישן</li>

      <h3>טיפים לשמירה על הנכס</h3>
      <ul>
        <li>דווח מיד על נזק לא מכוון</li>
        <li>אל תתלה מסמרים בקירות בלי אישור</li>
        <li>נקה את המזגן כל עונה</li>
        <li>דווח על נזישות מים מיד</li>
      </ul>
      
      <div class="modal-warning">⚠️ אי-דיווח על נזק יכול לגרום לאחריות נוספת בסוף השכירות</div>
    `
  },
  {

let currentCategory = 'all';
let currentSearch = '';

function renderArticles() {
  const grid = document.getElementById('articles-grid');
  const filtered = ARTICLES.filter(a => {
    const matchCat = currentCategory === 'all' || a.category === currentCategory;
    const matchSearch = !currentSearch || 
      a.title.includes(currentSearch) || 
      a.excerpt.includes(currentSearch) ||
      a.content.includes(currentSearch);
    return matchCat && matchSearch;
  });

  grid.innerHTML = filtered.map(a => `
    <div class="article-card" onclick="openArticle(${a.id})">
      <div class="card-stripe" style="background:${a.stripe};"></div>
      <div class="card-body">
        <div class="card-meta">
          <span class="card-category" style="background:${a.catColor};color:${a.catText};">${a.catLabel}</span>
          <span class="card-read-time">⏱️ ${a.readTime}</span>
        </div>
        <div class="card-title">${a.title}</div>
        <div class="card-excerpt">${a.excerpt}</div>
      </div>
      <div class="card-footer">
        <span class="card-icon">${a.icon}</span>
        <span class="card-arrow">קרא עוד ←</span>
      </div>
    </div>
  `).join('');

  if(filtered.length === 0) {
    grid.innerHTML = '<div style="text-align:center;color:#888;padding:40px;grid-column:1/-1;">לא נמצאו מאמרים</div>';
  }
}

function filterCategory(cat, btn) {
  currentCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderArticles();
}

function filterArticles() {
  currentSearch = document.getElementById('search-input').value;
  renderArticles();
}

function openArticle(id) {
  const a = ARTICLES.find(x => x.id === id);
  if(!a) return;

  document.getElementById('modal-cat').textContent = a.catLabel;
  document.getElementById('modal-cat').style.cssText = `background:${a.catColor};color:${a.catText};font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;display:inline-block;margin-bottom:12px;`;
  document.getElementById('modal-title').textContent = a.title;
  document.getElementById('modal-meta').textContent = `⏱️ ${a.readTime}`;
  document.getElementById('modal-body').innerHTML = a.content;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if(e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow = '';
  }
}

document.addEventListener('keydown', e => {
  if(e.key === 'Escape') {
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow = '';
  }
});

function checkSolar() {
  const addr = document.getElementById('solar-address').value.trim();
  if(!addr) { alert('נא להזין כתובת'); return; }
  
  const result = document.getElementById('solar-result');
  result.innerHTML = '<span style="color:#FFD600;">⏳ בודק...</span>';
  
  setTimeout(() => {
    result.innerHTML = `
      <div style="background:rgba(255,255,255,0.1);border-radius:12px;padding:16px;margin-top:8px;text-align:right;">
        <div style="font-size:15px;font-weight:700;margin-bottom:8px;">✅ הנכס ב${addr} עשוי להתאים למערכת סולארית!</div>
        <div style="font-size:13px;color:#B3C2F0;margin-bottom:12px;">לפרטים מדויקים ופגישה עם יועץ — צור קשר עם TIME.ME</div>
        <button onclick="window.location.href='app.html'" style="background:#FFD600;color:#1A237E;border:none;padding:10px 24px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Heebo',sans-serif;">🔑 כניסה למערכת לפרטים נוספים</button>
      </div>
    `;
  }, 1500);
}
